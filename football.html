<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Stadyum Simülatörü</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <style>
        body { background-color: #030712; color: #f3f4f6; font-family: sans-serif; }
        .nexus-card { background: #0b0f19; border: 1px solid #1e293b; }
    </style>
</head>
<body>

    <header class="h-20 nexus-card border-b flex items-center justify-between px-8">
        <button onclick="window.location.href='dashboard.html'" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-white rounded-xl text-xs font-bold">⬅️ Lobiye Dön</button>
        <div class="bg-gray-950 border border-gray-800 px-4 py-2 rounded-xl text-yellow-400 font-bold font-mono text-sm" id="foot-coins">0 🪙</div>
    </header>

    <div class="p-6 max-w-xl mx-auto w-full space-y-6">
        <div class="nexus-card rounded-2xl p-6 text-center">
            <h3 class="text-green-500 font-black text-xs tracking-widest mb-2">⚽ DYNAMIC LIVE MATCH PREDICTION</h3>
            <p class="text-[10px] text-gray-500 mb-6">Her bet çevriminde sistem otomatik olarak dünya devlerinden rastgele iki takım eşleştirir. (%50 Şans Oranı)</p>

            <div class="bg-gray-950 border border-gray-800 p-6 rounded-2xl flex flex-col sm:flex-row justify-around items-center gap-4 mb-6">
                <button onclick="betTeam('A')" id="teamA-btn" class="w-full sm:w-44 py-4 bg-gray-900 border border-gray-800 rounded-xl font-bold text-xs text-white hover:border-blue-500 transition-all">TAKIM A</button>
                <span class="text-xs font-mono font-black text-gray-600">VS</span>
                <button onclick="betTeam('B')" id="teamB-btn" class="w-full sm:w-44 py-4 bg-gray-900 border border-gray-800 rounded-xl font-bold text-xs text-white hover:border-blue-500 transition-all">TAKIM B</button>
            </div>

            <p id="match-status" class="text-xs font-bold text-green-400 h-6 mb-4 flex items-center justify-center"></p>
        </div>
    </div>

    <script>
        const session = localStorage.getItem('nexus_session');
        let users = JSON.parse(localStorage.getItem('nexus_users')) || [];
        let curr = users.find(u => u.username === session);

        const teamPool = [
            'Real Madrid ⚪', 'Barcelona 🔵🔴', 'Manchester City 🩵', 'Liverpool 🔴', 
            'Bayern Münih 🔴⚪', 'PSG 🔵', 'Juventus ⚪⚫', 'Inter 🔵⚫', 'AC Milan 🔴⚫',
            'Arsenal 🔴⚪', 'Dortmund 🟡⚫', 'Atletico Madrid 🔴⚪', 'Chelsea 🔵',
            'Galatasaray 🔴🟡', 'Fenerbahçe 🟡🔵', 'Beşiktaş 🦅', 'Trabzonspor 🔴🔵'
        ];

        let currentTeamA = "";
        let currentTeamB = "";

        function generateRandomTeams() {
            let indexA = Math.floor(Math.random() * teamPool.length);
            let indexB = Math.floor(Math.random() * teamPool.length);
            
            while(indexA === indexB) {
                indexB = Math.floor(Math.random() * teamPool.length);
            }

            currentTeamA = teamPool[indexA];
            currentTeamB = teamPool[indexB];

            document.getElementById('teamA-btn').innerText = currentTeamA;
            document.getElementById('teamB-btn').innerText = currentTeamB;
            document.getElementById('foot-coins').innerText = curr.coins.toLocaleString() + " 🪙";
        }

        function betTeam(selection) {
            // ADMIN YASAKLAMA KONTROLÜ
            if(curr.betDisabled === true) { alert("❌ Bahis yapma yetkiniz admin tarafından askıya alınmıştır!"); return; }

            let currentBet = parseInt(localStorage.getItem('nexus_current_bet')) || 100;
            if(curr.coins < currentBet) { alert(`Tahmin için en az ${currentBet} Coin gerekli!`); return; }
            
            curr.coins -= currentBet;
            document.getElementById('foot-coins').innerText = curr.coins.toLocaleString() + " 🪙";
            document.getElementById('match-status').innerText = "Maç simüle ediliyor, düdük çalındı...";

            document.getElementById('teamA-btn').disabled = true;
            document.getElementById('teamB-btn').disabled = true;

            setTimeout(() => {
                const result = Math.random() < 0.50 ? 'A' : 'B';
                const scoreA = Math.floor(Math.random() * 4);
                const scoreB = Math.floor(Math.random() * 4);
                
                let finalScore = "";
                if(result === 'A') { 
                    finalScore = `${Math.max(scoreA, scoreB+1)} - ${Math.min(scoreA, scoreB)}`; 
                } else { 
                    finalScore = `${Math.min(scoreA, scoreB)} - ${Math.max(scoreA, scoreB+1)}`; 
                }

                let payout = -currentBet;
                let logGameName = `${currentTeamA} vs ${currentTeamB}`;

                if(selection === result) {
                    let winAmount = currentBet * 2;
                    curr.coins += winAmount;
                    payout = winAmount - currentBet;
                    document.getElementById('match-status').innerHTML = `🎉 TAHMİN DOĞRU! <br> Maç Sonucu: [${finalScore}] +${winAmount} COIN`;
                } else {
                    document.getElementById('match-status').innerHTML = `❌ Maçı Kaybettiniz. <br> Maç Sonucu: [${finalScore}]`;
                }

                let history = JSON.parse(localStorage.getItem('nexus_bet_history')) || [];
                history.unshift({
                    time: new Date().toLocaleTimeString(),
                    user: curr.username,
                    game: `Futbol (${logGameName})`,
                    bet: currentBet,
                    payout: payout
                });
                localStorage.setItem('nexus_bet_history', JSON.stringify(history));

                let idx = users.findIndex(u => u.username === curr.username);
                users[idx] = curr;
                localStorage.setItem('nexus_users', JSON.stringify(users));

                document.getElementById('teamA-btn').disabled = false;
                document.getElementById('teamB-btn').disabled = false;
                generateRandomTeams();

            }, 800);
        }

        generateRandomTeams();
    </script>
</body>
</html>

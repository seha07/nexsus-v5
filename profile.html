<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Kullanıcı Profili</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <style>
        body { background-color: #030712; color: #f3f4f6; font-family: sans-serif; }
        .nexus-card { background: #0b0f19; border: 1px solid #1e293b; }
    </style>
</head>
<body>

    <header class="h-20 nexus-card border-b flex items-center justify-between px-8">
        <button onclick="window.location.href='dashboard.html'" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-white rounded-xl text-xs font-bold">⬅️ Lobiye Dön</button>
        <span class="text-xs font-mono font-bold text-blue-400 uppercase tracking-widest">KULLANICI GÜVENLİ HESAP ALANI</span>
    </header>

    <div class="p-6 max-w-4xl mx-auto w-full grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="space-y-6">
            <div class="nexus-card rounded-2xl p-6 border-l-4 border-blue-500 shadow-xl">
                <p class="text-[10px] text-blue-400 font-bold uppercase tracking-wider">🔒 GÜVENLİ KİMLİK</p>
                <div class="mt-3 space-y-2 text-xs">
                    <div class="bg-gray-950 p-3 rounded-xl border border-gray-800 flex justify-between"><span class="text-gray-500">Kullanıcı Adı:</span><span id="prof-u" class="font-bold text-white">-</span></div>
                    <div class="bg-gray-950 p-3 rounded-xl border border-gray-800 flex justify-between"><span class="text-gray-500">Hesap Şifresi:</span><span id="prof-p" class="font-mono text-gray-400">-</span></div>
                    <div class="bg-gray-950 p-3 rounded-xl border border-gray-800 flex justify-between"><span class="text-gray-500">Net Cüzdan:</span><span id="prof-c" class="font-bold text-yellow-400">0 🪙</span></div>
                    <div class="bg-gray-950 p-3 rounded-xl border border-gray-800 flex justify-between"><span class="text-gray-500">Çark Hakkı:</span><span id="prof-s" class="font-bold text-indigo-400">0 Hak</span></div>
                </div>
            </div>

            <div class="nexus-card rounded-2xl p-6 text-center border-t-4 border-indigo-500">
                <h4 class="text-white font-black text-xs uppercase tracking-wider mb-2">🎡 7 İHTİMALLİ ŞANS ÇARKINI ÇEVİR</h4>
                <p class="text-[10px] text-gray-500 mb-4">(Ödül Havuzu: 100 ile 1000 Coin Arası Rasgele 7 Dilim)</p>
                <p id="wheel-status" class="text-xs font-bold text-indigo-300 h-4 mb-3"></p>
                <button onclick="spinWheel7()" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold rounded-xl">ÇARKI TETİKLE</button>
            </div>
        </div>

        <div class="md:col-span-2 nexus-card rounded-2xl p-6 shadow-xl">
            <h3 class="text-gray-200 text-sm font-black tracking-wider uppercase mb-3">🕒 GEÇMİŞ BAHİS HAREKETLERİNİZ (BET LOGS)</h3>
            <div id="bet-history-box" class="space-y-2 max-h-96 overflow-y-auto pr-1 font-mono text-[11px] text-gray-400 divide-y divide-gray-900">
                </div>
        </div>

    </div>

    <script>
        const session = localStorage.getItem('nexus_session');
        if(!session) window.location.href = 'index.html';

        let users = JSON.parse(localStorage.getItem('nexus_users')) || [];
        let curr = users.find(u => u.username === session);
        
        const wheelRewards = [100, 200, 400, 500, 700, 800, 1000];

        function updateProfileUI() {
            if(curr.spinRights === undefined) curr.spinRights = 3;

            document.getElementById('prof-u').innerText = curr.username;
            document.getElementById('prof-p').innerText = curr.password;
            document.getElementById('prof-c').innerText = curr.coins.toLocaleString() + " 🪙";
            document.getElementById('prof-s').innerText = curr.spinRights + " Hak";

            let idx = users.findIndex(u => u.username === curr.username);
            users[idx] = curr;
            localStorage.setItem('nexus_users', JSON.stringify(users));

            let history = JSON.parse(localStorage.getItem('nexus_bet_history')) || [];
            let myHistory = history.filter(h => h.user === curr.username);

            const box = document.getElementById('bet-history-box');
            if(myHistory.length === 0) {
                box.innerHTML = '<p class="text-xs text-gray-500 italic p-2">Henüz hiçbir oyunda bahis yapmadınız.</p>';
            } else {
                box.innerHTML = myHistory.map(h => `
                    <div class="pt-2 flex justify-between items-center">
                        <div><span class="text-gray-600">[${h.time}]</span> <span class="text-white font-bold">${h.game}</span></div>
                        <div>Bet: <span class="text-gray-300 font-bold">${h.bet}</span> -> Sonuç: <span class="${h.payout >= 0 ? 'text-green-400' : 'text-red-400'} font-bold">${h.payout >= 0 ? '+' + h.payout : h.payout}</span></div>
                    </div>
                `).join('');
            }
        }

        function spinWheel7() {
            if(curr.spinRights < 1) { alert("Çevrim hakkınız kalmadı! Admin paneli üzerinden hak talep edebilirsiniz."); return; }
            curr.spinRights--;
            updateProfileUI();
            document.getElementById('wheel-status').innerText = "Çark hızla dönüyor...";

            setTimeout(() => {
                let randomReward = wheelRewards[Math.floor(Math.random() * 7)];
                curr.coins += randomReward;
                document.getElementById('wheel-status').innerText = `🎉 TEBRİKLER! +${randomReward} COIN HESABINIZA EKLENDİ!`;
                
                // ADMİN PANELİ ÇARK GEÇMİŞİNE YAZMA ENJEKTÖRÜ
                let wheelHistory = JSON.parse(localStorage.getItem('nexus_wheel_history')) || [];
                wheelHistory.unshift({
                    time: new Date().toLocaleTimeString(),
                    user: curr.username,
                    reward: randomReward + " COIN"
                });
                localStorage.setItem('nexus_wheel_history', JSON.stringify(wheelHistory));

                updateProfileUI();
            }, 600);
        }

        updateProfileUI();
    </script>
</body>
</html>

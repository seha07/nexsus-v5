<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Giriş Sistemi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md nexus-card p-8 rounded-2xl shadow-2xl space-y-6">
        <div class="text-center">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center text-xl font-bold mb-2">⚡</div>
            <h2 class="text-xl font-black tracking-wider text-white">NEXUS ENTERTAINMENT</h2>
            <p class="text-xs text-gray-400" id="form-title">Oyuncu Giriş Paneli</p>
        </div>

        <p id="msg" class="text-center text-xs font-bold text-red-400 h-4"></p>

        <!-- KULLANICI GİRİŞ FORMU -->
        <div id="login-form" class="space-y-4">
            <div>
                <label class="text-xs text-gray-400 font-bold block mb-1">KULLANICI ADI</label>
                <input type="text" id="login-username" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white outline-none">
            </div>
            <div>
                <label class="text-xs text-gray-400 font-bold block mb-1">ŞİFRE</label>
                <input type="password" id="login-password" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white outline-none">
            </div>
            <button onclick="handleLogin()" class="w-full py-3.5 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl text-sm transition-all">SİSTEME BAĞLAN</button>
            <p class="text-center text-xs text-gray-500">
                <span onclick="toggleAdminForm()" class="cursor-default text-gray-500 hover:text-gray-400 font-bold">H</span>esabınız yok mu? 
                <span onclick="toggleForm(true)" class="text-blue-400 cursor-pointer hover:underline">Kayıt Olun</span>
            </p>
        </div>

        <!-- GİZLİ ADMİN GİRİŞ FORMU (VARSAYILAN OLARAK GİZLİ) -->
        <div id="admin-login-form" class="space-y-4 hidden border-t border-red-900/50 pt-4">
            <p class="text-center text-xs font-bold text-red-400">⚠️ SECURE SYSTEM TERMINAL ACCESS</p>
            <div>
                <input type="text" id="admin-username" placeholder="Yönetici ID" class="w-full bg-gray-950 border border-red-900 rounded-xl px-4 py-2.5 text-xs text-white outline-none">
            </div>
            <div>
                <input type="password" id="admin-password" placeholder="Terminal Şifresi" class="w-full bg-gray-950 border border-red-900 rounded-xl px-4 py-2.5 text-xs text-white outline-none">
            </div>
            <button onclick="handleAdminLogin()" class="w-full py-2 bg-red-700 hover:bg-red-600 text-white text-xs font-bold rounded-xl">KİMLİK DOĞRULA</button>
        </div>

        <!-- KAYIT FORMU -->
        <div id="register-form" class="space-y-4 hidden">
            <div>
                <label class="text-xs text-gray-400 font-bold block mb-1">YENİ KULLANICI ADI</label>
                <input type="text" id="reg-username" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white outline-none">
            </div>
            <div>
                <label class="text-xs text-gray-400 font-bold block mb-1">ŞİFRE SEÇİN</label>
                <input type="password" id="reg-password" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white outline-none">
            </div>
            <button onclick="handleRegister()" class="w-full py-3.5 bg-green-600 hover:bg-green-500 text-white font-bold rounded-xl text-sm transition-all">KAYIT OL</button>
            <p class="text-center text-xs text-gray-500">Zaten üye misiniz? <span onclick="toggleForm(false)" class="text-blue-400 cursor-pointer hover:underline">Giriş Yapın</span></p>
        </div>
    </div>

    <script>
        if (!localStorage.getItem('nexus_users')) {
            localStorage.setItem('nexus_users', JSON.stringify([{ username: 'player1', password: '123', coins: 50000, spins: 5, banned: false }]));
        }
        if (!localStorage.getItem('nexus_tasks')) {
            localStorage.setItem('nexus_tasks', JSON.stringify([{ id: 1, text: 'Yeni eklenen uçak crash motorunu deneyimle.', reward: 1000 }]));
        }
        if (!localStorage.getItem('nexus_logs')) { localStorage.setItem('nexus_logs', JSON.stringify([])); }

        const admins = { 'admin11': 'admin123', 'admin22': 'admin123' };

        function toggleForm(showRegister) {
            document.getElementById('login-form').style.display = showRegister ? 'none' : 'block';
            document.getElementById('register-form').style.display = showRegister ? 'block' : 'none';
            document.getElementById('admin-login-form').classList.add('hidden');
            document.getElementById('msg').innerText = '';
        }

        function toggleAdminForm() {
            const adminForm = document.getElementById('admin-login-form');
            adminForm.classList.toggle('hidden');
        }

        function handleLogin() {
            const u = document.getElementById('login-username').value.trim();
            const p = document.getElementById('login-password').value;
            const msg = document.getElementById('msg');

            let users = JSON.parse(localStorage.getItem('nexus_users'));
            const user = users.find(userObj => userObj.username === u && userObj.password === p);

            if (user) {
                if (user.banned) { msg.innerText = "🚫 Hesabınız sistemden uzaklaştırılmıştır."; return; }
                localStorage.setItem('nexus_session', u);
                window.location.href = 'dashboard.html';
            } else {
                msg.innerText = "Hatalı oyuncu kimliği veya şifre!";
            }
        }

        function handleAdminLogin() {
            const u = document.getElementById('admin-username').value.trim();
            const p = document.getElementById('admin-password').value;
            if (admins[u] && admins[u] === p) {
                localStorage.setItem('nexus_current_admin', u);
                window.location.href = 'admin.html';
            } else {
                alert("ACCESS DENIED: Geçersiz Yetkili İmzası.");
            }
        }

        function handleRegister() {
            const u = document.getElementById('reg-username').value.trim();
            const p = document.getElementById('reg-password').value;
            const msg = document.getElementById('msg');
            if(!u || !p) return;

            let users = JSON.parse(localStorage.getItem('nexus_users'));
            if(users.find(userObj => userObj.username === u) || admins[u]) {
                msg.innerText = "Bu isim sistemde kayıtlıdır."; return;
            }

            users.push({ username: u, password: p, coins: 25000, spins: 5, banned: false });
            localStorage.setItem('nexus_users', JSON.stringify(users));
            msg.className = "text-center text-xs font-bold text-green-400 h-4";
            msg.innerText = "Kayıt Başarılı!";
            setTimeout(() => { toggleForm(false); }, 800);
        }
    </script>
</body>
</html>
